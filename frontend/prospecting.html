<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prospecting Templates — Real Estate AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2e2e2e;
      --accent: #c8a86b;
      --accent-dark: #a8883b;
      --text: #f0ece4;
      --muted: #888;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      position: relative;
    }

    .nav-logo {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      text-decoration: none;
    }

    .nav-logo span { color: var(--accent); }

    .nav-links {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }

    nav a.active { color: var(--accent); }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: var(--text);
      border-radius: 2px;
      transition: all 0.2s;
    }

    @media (max-width: 640px) {
      .hamburger { display: flex; }
      .nav-links {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 16px 20px;
        flex-direction: column;
        gap: 16px;
        z-index: 99;
      }
      .nav-links.open { display: flex; }
    }

    header {
      text-align: center;
      max-width: 640px;
      margin: 0 auto 40px;
      padding: 0 20px;
    }

    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { margin-top: 10px; color: var(--muted); font-size: 1rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 640px;
      margin: 0 auto 24px;
    }

    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    select option { background: #222; }
    textarea { resize: vertical; min-height: 80px; }

    .target-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .target-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.82rem;
      padding: 10px 6px;
      text-align: center;
      transition: all 0.15s;
      font-family: inherit;
      line-height: 1.3;
    }

    .target-btn:hover { border-color: var(--accent); color: var(--text); }
    .target-btn.selected {
      background: rgba(200, 168, 107, 0.12);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .tone-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

    .tone-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 9px 6px;
      text-align: center;
      transition: all 0.15s;
      font-family: inherit;
    }

    .tone-btn:hover { border-color: var(--accent); color: var(--text); }
    .tone-btn.selected {
      background: rgba(200, 168, 107, 0.12);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .generate-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0f0f0f;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      display: block;
      transition: background 0.15s, transform 0.1s;
    }

    .generate-btn:hover { background: var(--accent-dark); }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled { background: #444; color: #777; cursor: not-allowed; transform: none; }

    .output-card {
      display: none;
      max-width: 640px;
      margin: 24px auto 0;
    }

    .output-card.visible { display: block; }

    .variation {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
    }

    .variation-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .variation-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      font-weight: 700;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      padding: 6px 12px;
      transition: all 0.15s;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: #4caf50; color: #4caf50; }

    .variation-text {
      color: var(--text);
      font-size: 0.97rem;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #e57373;
      font-size: 0.9rem;
      padding: 12px;
      background: rgba(229, 115, 115, 0.1);
      border: 1px solid rgba(229, 115, 115, 0.2);
      border-radius: 6px;
    }

    .regen-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 12px;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      display: none;
      transition: all 0.15s;
    }

    .regen-btn:hover { border-color: var(--accent); color: var(--accent); }

    @media (max-width: 500px) {
      .grid-2 { grid-template-columns: 1fr; }
      .target-grid { grid-template-columns: repeat(2, 1fr); }
      .tone-grid { grid-template-columns: repeat(3, 1fr); }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Real Estate<span>AI</span></a>
    <button class="hamburger" id="hamburger-btn" aria-label="Menu"><span></span><span></span><span></span></button>
    <div class="nav-links" id="nav-links">
      <a href="/">Listing Generator</a>
      <a href="/follow-up.html">Lead Follow-Up</a>
      <a href="/objections.html">Objection Handler</a>
      <a href="/prospecting.html" class="active">Prospecting</a>
      <a href="/admin.html" id="admin-nav-link" style="display:none;">Dashboard</a>
    </div>
  </nav>

  <header>
    <h1><span>Prospecting</span> Templates</h1>
    <p>Pick your target. Get 3 ready-to-use outreach scripts.</p>
  </header>

  <div class="card">
    <h2>Who Are You Targeting?</h2>
    <div class="target-grid">
      <button class="target-btn selected" data-target="Expired Listing">Expired Listing</button>
      <button class="target-btn" data-target="FSBO (For Sale By Owner)">FSBO</button>
      <button class="target-btn" data-target="Sphere of Influence">Sphere of Influence</button>
      <button class="target-btn" data-target="Past Client">Past Client</button>
      <button class="target-btn" data-target="Neighborhood Farm">Neighborhood Farm</button>
      <button class="target-btn" data-target="Open House Follow-Up">Open House Follow-Up</button>
    </div>
  </div>

  <div class="card">
    <h2>Outreach Details</h2>
    <div class="grid-2">
      <div class="field">
        <label>Delivery Method</label>
        <select id="delivery">
          <option value="Cold call script">Cold call script</option>
          <option value="Text message">Text message</option>
          <option value="Email">Email</option>
          <option value="Door hanger / mailer">Door hanger / mailer</option>
          <option value="LinkedIn / DM">LinkedIn / DM</option>
        </select>
      </div>
      <div class="field">
        <label>Your Goal</label>
        <select id="goal">
          <option value="Book a listing appointment">Book a listing appointment</option>
          <option value="Book a buyer consultation">Book a buyer consultation</option>
          <option value="Stay top of mind">Stay top of mind</option>
          <option value="Offer a free home valuation">Offer a free home valuation</option>
          <option value="Invite to an open house">Invite to an open house</option>
        </select>
      </div>
      <div class="field full">
        <label>Context (optional) — any details that make this outreach more specific</label>
        <textarea id="context" placeholder="e.g. Their listing expired after 90 days, originally listed at $620k, 4BR in North Austin..."></textarea>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Tone</h2>
    <div class="tone-grid">
      <button class="tone-btn selected" data-tone="Conversational">Conversational</button>
      <button class="tone-btn" data-tone="Professional">Professional</button>
      <button class="tone-btn" data-tone="Direct">Direct</button>
    </div>
  </div>

  <button class="generate-btn" id="generate-btn">Generate 3 Templates</button>
  <p id="gen-counter" style="text-align:center;font-size:0.8rem;margin-top:10px;max-width:640px;margin-left:auto;margin-right:auto;"></p>

  <div class="output-card" id="output-card"></div>

  <button class="regen-btn" id="regen-btn">Generate 3 More Variations</button>

  <p style="text-align:center;font-size:0.7rem;color:#444;margin-top:40px;">v1.0 · <a href="#" id="admin-link" style="color:#333;text-decoration:none;">Admin</a></p>

  <!-- Admin Modal -->
  <div id="admin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:100%;max-width:360px;margin:20px;">
      <h2 style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:20px;">Admin Login</h2>
      <div class="field" style="margin-bottom:12px;">
        <label>Username</label>
        <input type="text" id="admin-username" value="Admin" />
      </div>
      <div class="field" style="margin-bottom:20px;">
        <label>Password</label>
        <input type="password" id="admin-password" />
      </div>
      <p id="admin-error" style="color:#e57373;font-size:0.85rem;margin-bottom:12px;display:none;"></p>
      <button class="generate-btn" id="admin-submit" style="margin-bottom:10px;">Login</button>
      <button id="admin-cancel" style="background:none;border:none;color:var(--muted);font-size:0.85rem;cursor:pointer;width:100%;font-family:inherit;">Cancel</button>
    </div>
  </div>

  <script>
    const FREE_LIMIT = 10;
    const ADMIN_TOKEN_KEY = 'admin_token';

    function isAdmin() { return !!localStorage.getItem(ADMIN_TOKEN_KEY); }
    function getCount() { return parseInt(localStorage.getItem('gen_count') || '0'); }
    function incrementCount() { localStorage.setItem('gen_count', getCount() + 1); }
    function getSessionId() {
      let id = localStorage.getItem('session_id');
      if (!id) { id = 'sess_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('session_id', id); }
      return id;
    }
    function logPaywall() {
      fetch('/api/log/paywall', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-Token': localStorage.getItem('admin_token') || '', 'X-Session-Id': getSessionId() }, body: '{}' }).catch(() => {});
    }

    const _pageStart = Date.now();
    const _visitKey = 'visit_count_prospecting';
    const _visitCount = (parseInt(localStorage.getItem(_visitKey)) || 0) + 1;
    localStorage.setItem(_visitKey, _visitCount);
    let _visitId = null;
    fetch('/api/log/visit', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-Token': localStorage.getItem('admin_token') || '', 'X-Session-Id': getSessionId() }, body: JSON.stringify({ page: 'prospecting', referrer: document.referrer || null, visit_count: _visitCount }) })
      .then(r => r.json()).then(d => {
        _visitId = d.id;
        if (_visitId) {
          const pingExit = () => fetch('/api/log/exit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id: _visitId, time_on_page: Math.round((Date.now() - _pageStart) / 1000) }) }).catch(() => {});
          setTimeout(pingExit, 10000);
          setInterval(pingExit, 30000);
        }
      }).catch(() => {});

    function updateCounter() {
      const el = document.getElementById('gen-counter');
      if (isAdmin()) {
        el.textContent = 'Admin — unlimited generations';
        el.style.color = 'var(--accent)';
        return;
      }
      const remaining = Math.max(0, FREE_LIMIT - getCount());
      if (remaining > 0) {
        el.textContent = `${remaining} free generation${remaining === 1 ? '' : 's'} remaining`;
        el.style.color = remaining === 1 ? '#e57373' : 'var(--muted)';
      } else {
        el.textContent = 'Free limit reached';
        el.style.color = '#e57373';
      }
    }

    function updateAdminLink() {
      const link = document.getElementById('admin-link');
      if (isAdmin()) {
        link.textContent = 'Admin: Logged In · Logout';
        link.style.color = 'var(--accent)';
      } else {
        link.textContent = 'Admin';
        link.style.color = '#333';
      }
    }

    let selectedTarget = 'Expired Listing';
    let selectedTone = 'Conversational';

    document.querySelectorAll('.target-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.target-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedTarget = btn.dataset.target;
      });
    });

    document.querySelectorAll('.tone-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedTone = btn.dataset.tone;
      });
    });

    updateCounter();
    updateAdminLink();
    if (isAdmin()) document.getElementById('admin-nav-link').style.display = 'block';
    document.getElementById('hamburger-btn').addEventListener('click', () => document.getElementById('nav-links').classList.toggle('open'));

    // Admin modal
    document.getElementById('admin-link').addEventListener('click', (e) => {
      e.preventDefault();
      if (isAdmin()) {
        localStorage.removeItem(ADMIN_TOKEN_KEY);
        updateAdminLink();
        updateCounter();
      } else {
        document.getElementById('admin-modal').style.display = 'flex';
        document.getElementById('admin-password').focus();
      }
    });

    document.getElementById('admin-cancel').addEventListener('click', () => {
      document.getElementById('admin-modal').style.display = 'none';
    });

    document.getElementById('admin-submit').addEventListener('click', async () => {
      const username = document.getElementById('admin-username').value.trim();
      const password = document.getElementById('admin-password').value.trim();
      const errorEl = document.getElementById('admin-error');
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Token': localStorage.getItem('admin_token') || '', 'X-Session-Id': getSessionId() },
          body: JSON.stringify({ username, password }),
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        localStorage.setItem(ADMIN_TOKEN_KEY, data.token);
        document.getElementById('admin-modal').style.display = 'none';
        updateAdminLink();
        updateCounter();
        document.getElementById('admin-password').value = '';
      } catch {
        errorEl.textContent = 'Invalid username or password.';
        errorEl.style.display = 'block';
      }
    });

    document.getElementById('admin-password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('admin-submit').click();
    });

    function copyText(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    function renderVariations(variations) {
      const outputCard = document.getElementById('output-card');
      outputCard.innerHTML = variations.map((v, i) => `
        <div class="variation">
          <div class="variation-header">
            <span class="variation-label">Variation ${i + 1}${v.angle ? ' — ' + v.angle : ''}</span>
            <button class="copy-btn" data-idx="${i}">Copy</button>
          </div>
          <div class="variation-text" id="var-text-${i}">${v.body}</div>
        </div>
      `).join('');

      variations.forEach((v, i) => {
        outputCard.querySelector(`[data-idx="${i}"]`).addEventListener('click', function() {
          copyText(this, v.body);
        });
      });

      outputCard.classList.add('visible');
      document.getElementById('regen-btn').style.display = 'block';
    }

    async function generate() {
      if (!isAdmin() && getCount() >= FREE_LIMIT) {
        logPaywall();
        const outputCard = document.getElementById('output-card');
        outputCard.classList.add('visible');
        outputCard.innerHTML = `<div class="error-msg" style="text-align:center;padding:20px;line-height:1.8;">
          You've used your 10 free generations.<br><br>
          <strong style="color:var(--text);">Want full access?</strong><br>
          Email <a href="mailto:a.meach14@gmail.com" style="color:var(--accent);">a.meach14@gmail.com</a>
        </div>`;
        return;
      }

      const payload = {
        target: selectedTarget,
        delivery: document.getElementById('delivery').value,
        goal: document.getElementById('goal').value,
        context: document.getElementById('context').value.trim(),
        tone: selectedTone,
      };

      const btn = document.getElementById('generate-btn');
      const outputCard = document.getElementById('output-card');
      btn.disabled = true;
      btn.textContent = 'Generating...';
      outputCard.classList.add('visible');
      outputCard.innerHTML = '<div class="loading"><div class="spinner"></div>Writing your templates...</div>';
      document.getElementById('regen-btn').style.display = 'none';

      try {
        const res = await fetch('/api/prospecting', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Token': localStorage.getItem('admin_token') || '', 'X-Session-Id': getSessionId() },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || 'Failed');
        incrementCount();
        updateCounter();
        renderVariations(data.variations);
      } catch (err) {
        outputCard.innerHTML = `<div class="error-msg">${err.message || 'Failed to generate. Please try again.'}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate 3 Templates';
      }
    }

    document.getElementById('generate-btn').addEventListener('click', generate);
    document.getElementById('regen-btn').addEventListener('click', generate);
  </script>
</body>
</html>
