<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Listing Generator — MLS Descriptions in Seconds</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2e2e2e;
      --accent: #c8a86b;
      --accent-dark: #a8883b;
      --text: #f0ece4;
      --muted: #888;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    header {
      text-align: center;
      max-width: 640px;
      margin: 0 auto 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 640px;
      margin: 0 auto 24px;
    }

    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    select option { background: #222; }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .tone-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .tone-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 9px 6px;
      text-align: center;
      transition: all 0.15s;
      font-family: inherit;
    }

    .tone-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .tone-btn.selected {
      background: rgba(200, 168, 107, 0.12);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .length-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .generate-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0f0f0f;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding: 14px;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      display: block;
      transition: background 0.15s, transform 0.1s;
    }

    .generate-btn:hover { background: var(--accent-dark); }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled {
      background: #444;
      color: #777;
      cursor: not-allowed;
      transform: none;
    }

    .output-card {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 640px;
      margin: 24px auto 0;
    }

    .output-card.visible { display: block; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .output-header h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      padding: 6px 12px;
      transition: all 0.15s;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .copy-btn.copied {
      border-color: #4caf50;
      color: #4caf50;
    }

    #output-text {
      color: var(--text);
      font-size: 0.97rem;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #e57373;
      font-size: 0.9rem;
      padding: 12px;
      background: rgba(229, 115, 115, 0.1);
      border: 1px solid rgba(229, 115, 115, 0.2);
      border-radius: 6px;
    }

    @media (max-width: 500px) {
      .grid-2 { grid-template-columns: 1fr; }
      .tone-grid { grid-template-columns: repeat(2, 1fr); }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav style="background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;gap:24px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;">
    <a href="/" style="color:var(--accent);text-decoration:none;font-size:0.85rem;font-weight:600;">Listing Generator</a>
    <a href="/follow-up.html" style="color:var(--muted);text-decoration:none;font-size:0.85rem;font-weight:600;">Lead Follow-Up</a>
    <a href="/objections.html" style="color:var(--muted);text-decoration:none;font-size:0.85rem;font-weight:600;">Objection Handler</a>
  </nav>

  <header>
    <h1>AI <span>Listing</span> Generator</h1>
    <p>Fill in the details. Get a polished MLS description in seconds.</p>
  </header>

  <div class="card">
    <h2>Property Details</h2>
    <div class="grid-2">
      <div class="field">
        <label>Property Type</label>
        <select id="type">
          <option value="Single Family Home" selected>Single Family Home</option>
          <option value="Condo">Condo</option>
          <option value="Townhouse">Townhouse</option>
          <option value="Multi-Family">Multi-Family</option>
          <option value="Land/Lot">Land/Lot</option>
        </select>
      </div>
      <div class="field">
        <label>Price (optional)</label>
        <input type="text" id="price" value="$525,000" />
      </div>
      <div class="field">
        <label>Bedrooms</label>
        <input type="number" id="beds" value="4" min="0" max="20" />
      </div>
      <div class="field">
        <label>Bathrooms</label>
        <input type="number" id="baths" value="2.5" min="0" max="20" step="0.5" />
      </div>
      <div class="field">
        <label>Square Footage</label>
        <input type="text" id="sqft" value="2,200" />
      </div>
      <div class="field">
        <label>Year Built (optional)</label>
        <input type="text" id="year" value="2018" />
      </div>
      <div class="field full">
        <label>Neighborhood / Area</label>
        <input type="text" id="neighborhood" value="South Austin, near Barton Springs" />
      </div>
      <div class="field full">
        <label>Key Features & Highlights</label>
        <textarea id="features">Updated kitchen with quartz countertops and stainless appliances, primary suite with walk-in closet and spa bath, covered back patio, attached 2-car garage, hardwood floors throughout, walking distance to top-rated schools</textarea>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Tone</h2>
    <div class="tone-grid">
      <button class="tone-btn selected" data-tone="Professional">Professional</button>
      <button class="tone-btn" data-tone="Warm & Inviting">Warm</button>
      <button class="tone-btn" data-tone="Luxury">Luxury</button>
      <button class="tone-btn" data-tone="Casual & Friendly">Casual</button>
    </div>
  </div>

  <div class="card">
    <h2>Length</h2>
    <div class="length-grid">
      <button class="tone-btn" data-length="short">Short (~100 words)</button>
      <button class="tone-btn selected" data-length="medium">Medium (~200 words)</button>
      <button class="tone-btn" data-length="long">Long (~300 words)</button>
    </div>
  </div>

  <div style="max-width:640px;margin:0 auto 24px;">
    <button id="advanced-toggle" style="background:none;border:none;color:var(--muted);font-size:0.85rem;cursor:pointer;padding:0;display:flex;align-items:center;gap:6px;font-family:inherit;">
      <span id="advanced-arrow" style="font-size:0.7rem;">▶</span> Advanced options
    </button>
    <div id="advanced-panel" style="display:none;margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;display:none;">
      <div class="field" style="margin-bottom:16px;">
        <label>Style Reference — paste a listing you love, AI will match its tone</label>
        <textarea id="style-reference" placeholder="Paste an example listing description here..." style="min-height:90px;"></textarea>
      </div>
      <div class="field">
        <label>Additional Notes — anything specific to include or adjust</label>
        <textarea id="notes" placeholder="e.g. Mention the school district, keep it punchy, emphasize the backyard..."></textarea>
      </div>
    </div>
  </div>

  <button class="generate-btn" id="generate-btn">Generate Listing Description</button>
  <p id="gen-counter" style="text-align:center;font-size:0.8rem;margin-top:10px;max-width:640px;margin-left:auto;margin-right:auto;"></p>

  <div class="output-card" id="output-card">
    <div class="output-header">
      <h2>Your Listing Description</h2>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="word-count" style="font-size:0.75rem;color:var(--muted);"></span>
        <button class="copy-btn" id="copy-btn">Copy</button>
      </div>
    </div>
    <div id="output-text"></div>
    <button class="copy-btn" id="regen-btn" style="margin-top:16px;width:100%;padding:10px;display:none;">Regenerate</button>

    <div id="extras-section" style="display:none;margin-top:20px;border-top:1px solid var(--border);padding-top:16px;">
      <p style="font-size:0.75rem;color:var(--muted);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;">Generate More from This Listing</p>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
        <button class="tone-btn" id="btn-social">Social Post</button>
        <button class="tone-btn" id="btn-email">Email Template</button>
        <button class="tone-btn" id="btn-zillow">Listing Site Version</button>
      </div>
    </div>
  </div>

  <div class="output-card" id="extra-card" style="display:none;margin-top:16px;">
    <div class="output-header">
      <h2 id="extra-title">Social Post</h2>
      <button class="copy-btn" id="extra-copy-btn">Copy</button>
    </div>
    <div id="extra-text"></div>
  </div>

  <script>
    const FREE_LIMIT = 10;

    function getCount() { return parseInt(localStorage.getItem('gen_count') || '0'); }
    function incrementCount() { localStorage.setItem('gen_count', getCount() + 1); }

    function isAdmin() { return !!localStorage.getItem('admin_token'); }

    function updateCounter() {
      const el = document.getElementById('gen-counter');
      if (isAdmin()) {
        el.textContent = 'Admin — unlimited generations';
        el.style.color = 'var(--accent)';
        return;
      }
      const remaining = Math.max(0, FREE_LIMIT - getCount());
      if (remaining > 0) {
        el.textContent = `${remaining} free generation${remaining === 1 ? '' : 's'} remaining`;
        el.style.color = remaining === 1 ? '#e57373' : 'var(--muted)';
      } else {
        el.textContent = 'Free limit reached';
        el.style.color = '#e57373';
      }
    }

    let selectedTone = 'Professional';
    let selectedLength = 'medium';

    // Tone buttons
    document.querySelectorAll('.tone-btn[data-tone]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tone-btn[data-tone]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedTone = btn.dataset.tone;
      });
    });

    // Length buttons
    document.querySelectorAll('.tone-btn[data-length]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tone-btn[data-length]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedLength = btn.dataset.length;
      });
    });

    updateCounter();

    // Advanced toggle
    document.getElementById('advanced-toggle').addEventListener('click', () => {
      const panel = document.getElementById('advanced-panel');
      const arrow = document.getElementById('advanced-arrow');
      const open = panel.style.display === 'block';
      panel.style.display = open ? 'none' : 'block';
      arrow.textContent = open ? '▶' : '▼';
    });

    // Generate
    document.getElementById('generate-btn').addEventListener('click', async () => {
      if (!isAdmin() && getCount() >= FREE_LIMIT) {
        const outputCard = document.getElementById('output-card');
        const outputText = document.getElementById('output-text');
        outputCard.classList.add('visible');
        outputText.innerHTML = `<div class="error-msg" style="text-align:center;padding:20px;line-height:1.8;">
          You've used your 10 free generations.<br><br>
          <strong style="color:var(--text);">Want full access?</strong><br>
          Email <a href="mailto:a.meach14@gmail.com" style="color:var(--accent);">a.meach14@gmail.com</a>
        </div>`;
        return;
      }
      const payload = {
        type: document.getElementById('type').value,
        price: document.getElementById('price').value.trim(),
        beds: document.getElementById('beds').value.trim(),
        baths: document.getElementById('baths').value.trim(),
        sqft: document.getElementById('sqft').value.trim(),
        year: document.getElementById('year').value.trim(),
        neighborhood: document.getElementById('neighborhood').value.trim(),
        features: document.getElementById('features').value.trim(),
        tone: selectedTone,
        length: selectedLength,
        styleReference: document.getElementById('style-reference').value.trim(),
        notes: document.getElementById('notes').value.trim(),
      };

      if (!payload.features) {
        alert('Please enter at least a few key features.');
        return;
      }

      const btn = document.getElementById('generate-btn');
      const outputCard = document.getElementById('output-card');
      const outputText = document.getElementById('output-text');

      btn.disabled = true;
      btn.textContent = 'Generating...';
      outputCard.classList.add('visible');
      outputText.innerHTML = '<div class="loading"><div class="spinner"></div> Writing your listing...</div>';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Server error ${res.status}`);
        }

        const data = await res.json();
        outputText.textContent = data.description;
        incrementCount();
        updateCounter();
        const words = data.description.trim().split(/\s+/).length;
        document.getElementById('word-count').textContent = `${words} words`;
        document.getElementById('regen-btn').style.display = 'block';
        document.getElementById('extras-section').style.display = 'block';
        document.getElementById('extra-card').style.display = 'none';
        lastDescription = data.description;
      } catch (err) {
        outputText.innerHTML = `<div class="error-msg">Error: ${err.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Listing Description';
      }
    });

    let lastDescription = '';

    async function generateExtra(type, title) {
      if (!isAdmin() && getCount() >= FREE_LIMIT) {
        const extraCard = document.getElementById('extra-card');
        const extraText = document.getElementById('extra-text');
        extraCard.style.display = 'block';
        extraText.innerHTML = `<div class="error-msg" style="text-align:center;padding:20px;line-height:1.8;">
          You've used your 10 free generations.<br><br>
          <strong style="color:var(--text);">Want full access?</strong><br>
          Email <a href="mailto:a.meach14@gmail.com" style="color:var(--accent);">a.meach14@gmail.com</a>
        </div>`;
        return;
      }

      const extraCard = document.getElementById('extra-card');
      const extraText = document.getElementById('extra-text');
      const extraTitle = document.getElementById('extra-title');
      extraCard.style.display = 'block';
      extraTitle.textContent = title;
      extraText.innerHTML = '<div class="loading"><div class="spinner"></div> Writing...</div>';
      extraCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      try {
        const res = await fetch('/api/extra', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ description: lastDescription, type }),
        });
        if (!res.ok) throw new Error('Server error');
        const data = await res.json();
        extraText.textContent = data.content;
        incrementCount();
        updateCounter();
      } catch (err) {
        extraText.innerHTML = `<div class="error-msg">Error: ${err.message}</div>`;
      }
    }

    document.getElementById('btn-social').addEventListener('click', () => generateExtra('social', 'Social Post'));
    document.getElementById('btn-email').addEventListener('click', () => generateExtra('email', 'Email Template'));
    document.getElementById('btn-zillow').addEventListener('click', () => generateExtra('zillow', 'Listing Site Version'));

    document.getElementById('extra-copy-btn').addEventListener('click', () => {
      const text = document.getElementById('extra-text').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('extra-copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    });

    // Regenerate
    document.getElementById('regen-btn').addEventListener('click', () => {
      document.getElementById('generate-btn').click();
    });

    // Copy
    document.getElementById('copy-btn').addEventListener('click', () => {
      const text = document.getElementById('output-text').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      });
    });
  </script>
  <p style="text-align:center;font-size:0.7rem;color:#444;margin-top:40px;">v4.0 · <a href="#" id="admin-link" style="color:#333;text-decoration:none;">Admin</a></p>

  <!-- Admin Modal -->
  <div id="admin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:100%;max-width:360px;margin:20px;">
      <h2 style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:20px;" id="modal-title">Admin Login</h2>
      <div class="field" style="margin-bottom:12px;">
        <label>Username</label>
        <input type="text" id="admin-username" value="Admin" />
      </div>
      <div class="field" style="margin-bottom:20px;">
        <label>Password</label>
        <input type="password" id="admin-password" />
      </div>
      <p id="admin-error" style="color:#e57373;font-size:0.85rem;margin-bottom:12px;display:none;"></p>
      <button class="generate-btn" id="admin-submit" style="margin-bottom:10px;">Login</button>
      <button id="admin-cancel" style="background:none;border:none;color:var(--muted);font-size:0.85rem;cursor:pointer;width:100%;font-family:inherit;">Cancel</button>
    </div>
  </div>

  <script>
    const ADMIN_TOKEN_KEY = 'admin_token';

    function isAdmin() { return !!localStorage.getItem(ADMIN_TOKEN_KEY); }

    function updateAdminLink() {
      const link = document.getElementById('admin-link');
      if (isAdmin()) {
        link.textContent = 'Admin: Logged In · Logout';
        link.style.color = 'var(--accent)';
      } else {
        link.textContent = 'Admin';
        link.style.color = '#333';
      }
    }

    updateAdminLink();

    document.getElementById('admin-link').addEventListener('click', (e) => {
      e.preventDefault();
      if (isAdmin()) {
        localStorage.removeItem(ADMIN_TOKEN_KEY);
        updateAdminLink();
        updateCounter();
      } else {
        const modal = document.getElementById('admin-modal');
        modal.style.display = 'flex';
        document.getElementById('admin-password').focus();
      }
    });

    document.getElementById('admin-cancel').addEventListener('click', () => {
      document.getElementById('admin-modal').style.display = 'none';
    });

    document.getElementById('admin-submit').addEventListener('click', async () => {
      const username = document.getElementById('admin-username').value.trim();
      const password = document.getElementById('admin-password').value.trim();
      const errorEl = document.getElementById('admin-error');

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        if (!res.ok) throw new Error('Invalid credentials.');
        const data = await res.json();
        localStorage.setItem(ADMIN_TOKEN_KEY, data.token);
        document.getElementById('admin-modal').style.display = 'none';
        updateAdminLink();
        updateCounter();
        document.getElementById('admin-password').value = '';
      } catch {
        errorEl.textContent = 'Invalid username or password.';
        errorEl.style.display = 'block';
      }
    });

    document.getElementById('admin-password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('admin-submit').click();
    });
  </script>
</body>
</html>
