<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Listing Generator — MLS Descriptions in Seconds</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2e2e2e;
      --accent: #c8a86b;
      --accent-dark: #a8883b;
      --text: #f0ece4;
      --muted: #888;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    header {
      text-align: center;
      max-width: 640px;
      margin: 0 auto 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 640px;
      margin: 0 auto 24px;
    }

    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    select option { background: #222; }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .tone-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .tone-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 9px 6px;
      text-align: center;
      transition: all 0.15s;
      font-family: inherit;
    }

    .tone-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .tone-btn.selected {
      background: rgba(200, 168, 107, 0.12);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .length-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .generate-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0f0f0f;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      padding: 14px;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      display: block;
      transition: background 0.15s, transform 0.1s;
    }

    .generate-btn:hover { background: var(--accent-dark); }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled {
      background: #444;
      color: #777;
      cursor: not-allowed;
      transform: none;
    }

    .output-card {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 640px;
      margin: 24px auto 0;
    }

    .output-card.visible { display: block; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .output-header h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      padding: 6px 12px;
      transition: all 0.15s;
    }

    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .copy-btn.copied {
      border-color: #4caf50;
      color: #4caf50;
    }

    #output-text {
      color: var(--text);
      font-size: 0.97rem;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #e57373;
      font-size: 0.9rem;
      padding: 12px;
      background: rgba(229, 115, 115, 0.1);
      border: 1px solid rgba(229, 115, 115, 0.2);
      border-radius: 6px;
    }

    @media (max-width: 500px) {
      .grid-2 { grid-template-columns: 1fr; }
      .tone-grid { grid-template-columns: repeat(2, 1fr); }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>AI <span>Listing</span> Generator</h1>
    <p>Fill in the details. Get a polished MLS description in seconds.</p>
  </header>

  <div class="card">
    <h2>Property Details</h2>
    <div class="grid-2">
      <div class="field">
        <label>Property Type</label>
        <select id="type">
          <option value="Single Family Home">Single Family Home</option>
          <option value="Condo">Condo</option>
          <option value="Townhouse">Townhouse</option>
          <option value="Multi-Family">Multi-Family</option>
          <option value="Land/Lot">Land/Lot</option>
        </select>
      </div>
      <div class="field">
        <label>Price (optional)</label>
        <input type="text" id="price" placeholder="e.g. $485,000" />
      </div>
      <div class="field">
        <label>Bedrooms</label>
        <input type="number" id="beds" placeholder="e.g. 3" min="0" max="20" />
      </div>
      <div class="field">
        <label>Bathrooms</label>
        <input type="number" id="baths" placeholder="e.g. 2" min="0" max="20" step="0.5" />
      </div>
      <div class="field">
        <label>Square Footage</label>
        <input type="text" id="sqft" placeholder="e.g. 1,850" />
      </div>
      <div class="field">
        <label>Year Built (optional)</label>
        <input type="text" id="year" placeholder="e.g. 2005" />
      </div>
      <div class="field full">
        <label>Neighborhood / Area</label>
        <input type="text" id="neighborhood" placeholder="e.g. South Austin, near Barton Springs" />
      </div>
      <div class="field full">
        <label>Key Features & Highlights</label>
        <textarea id="features" placeholder="e.g. Updated kitchen with quartz countertops, primary suite with walk-in closet, oversized backyard, attached 2-car garage, walking distance to top-rated schools"></textarea>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Tone</h2>
    <div class="tone-grid">
      <button class="tone-btn selected" data-tone="Professional">Professional</button>
      <button class="tone-btn" data-tone="Warm & Inviting">Warm</button>
      <button class="tone-btn" data-tone="Luxury">Luxury</button>
      <button class="tone-btn" data-tone="Casual & Friendly">Casual</button>
    </div>
  </div>

  <div class="card">
    <h2>Length</h2>
    <div class="length-grid">
      <button class="tone-btn" data-length="short">Short (~100 words)</button>
      <button class="tone-btn selected" data-length="medium">Medium (~200 words)</button>
      <button class="tone-btn" data-length="long">Long (~300 words)</button>
    </div>
  </div>

  <div class="card">
    <h2>Style Reference <span style="color:var(--muted);font-size:0.7rem;text-transform:none;letter-spacing:0;font-weight:400;">(optional)</span></h2>
    <div class="field">
      <label>Paste a listing you love — AI will match its tone</label>
      <textarea id="style-reference" placeholder="Paste an example listing description here..." style="min-height:100px;"></textarea>
    </div>
  </div>

  <div class="card">
    <h2>Additional Notes <span style="color:var(--muted);font-size:0.7rem;text-transform:none;letter-spacing:0;font-weight:400;">(optional)</span></h2>
    <div class="field">
      <label>Anything specific to include, adjust, or emphasize</label>
      <textarea id="notes" placeholder="e.g. Mention the school district, keep it under 150 words, emphasize the backyard..."></textarea>
    </div>
  </div>

  <button class="generate-btn" id="generate-btn">Generate Listing Description</button>

  <div class="output-card" id="output-card">
    <div class="output-header">
      <h2>Your Listing Description</h2>
      <button class="copy-btn" id="copy-btn">Copy</button>
    </div>
    <div id="output-text"></div>
  </div>

  <script>
    let selectedTone = 'Professional';
    let selectedLength = 'medium';

    // Tone buttons
    document.querySelectorAll('.tone-btn[data-tone]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tone-btn[data-tone]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedTone = btn.dataset.tone;
      });
    });

    // Length buttons
    document.querySelectorAll('.tone-btn[data-length]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tone-btn[data-length]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedLength = btn.dataset.length;
      });
    });

    // Generate
    document.getElementById('generate-btn').addEventListener('click', async () => {
      const payload = {
        type: document.getElementById('type').value,
        price: document.getElementById('price').value.trim(),
        beds: document.getElementById('beds').value.trim(),
        baths: document.getElementById('baths').value.trim(),
        sqft: document.getElementById('sqft').value.trim(),
        year: document.getElementById('year').value.trim(),
        neighborhood: document.getElementById('neighborhood').value.trim(),
        features: document.getElementById('features').value.trim(),
        tone: selectedTone,
        length: selectedLength,
        styleReference: document.getElementById('style-reference').value.trim(),
        notes: document.getElementById('notes').value.trim(),
      };

      if (!payload.features) {
        alert('Please enter at least a few key features.');
        return;
      }

      const btn = document.getElementById('generate-btn');
      const outputCard = document.getElementById('output-card');
      const outputText = document.getElementById('output-text');

      btn.disabled = true;
      btn.textContent = 'Generating...';
      outputCard.classList.add('visible');
      outputText.innerHTML = '<div class="loading"><div class="spinner"></div> Writing your listing...</div>';

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || `Server error ${res.status}`);
        }

        const data = await res.json();
        outputText.textContent = data.description;
      } catch (err) {
        outputText.innerHTML = `<div class="error-msg">Error: ${err.message}</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Listing Description';
      }
    });

    // Copy
    document.getElementById('copy-btn').addEventListener('click', () => {
      const text = document.getElementById('output-text').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      });
    });
  </script>
</body>
</html>
