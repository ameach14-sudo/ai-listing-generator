<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lead Follow-Up Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2e2e2e;
      --accent: #c8a86b;
      --accent-dark: #a8883b;
      --text: #f0ece4;
      --muted: #888;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      gap: 24px;
      justify-content: center;
      margin-bottom: 20px;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }

    nav a.active { color: var(--accent); }

    header {
      text-align: center;
      max-width: 640px;
      margin: 0 auto 40px;
      padding: 0 20px;
    }

    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { margin-top: 10px; color: var(--muted); font-size: 1rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 640px;
      margin: 0 auto 24px;
    }

    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    select option { background: #222; }
    textarea { resize: vertical; min-height: 80px; }

    .tone-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

    .tone-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 9px 6px;
      text-align: center;
      transition: all 0.15s;
      font-family: inherit;
    }

    .tone-btn:hover { border-color: var(--accent); color: var(--text); }
    .tone-btn.selected {
      background: rgba(200, 168, 107, 0.12);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .generate-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0f0f0f;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      display: block;
      transition: background 0.15s, transform 0.1s;
    }

    .generate-btn:hover { background: var(--accent-dark); }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled { background: #444; color: #777; cursor: not-allowed; transform: none; }

    .email-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      max-width: 640px;
      margin: 16px auto 0;
      display: none;
    }

    .email-card.visible { display: block; }

    .email-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .email-header h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      padding: 6px 12px;
      transition: all 0.15s;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: #4caf50; color: #4caf50; }

    .email-purpose {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .email-body {
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 20px 0;
      justify-content: center;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #e57373;
      font-size: 0.9rem;
      padding: 12px;
      background: rgba(229, 115, 115, 0.1);
      border: 1px solid rgba(229, 115, 115, 0.2);
      border-radius: 6px;
    }

    @media (max-width: 500px) {
      .grid-2 { grid-template-columns: 1fr; }
      .tone-grid { grid-template-columns: repeat(2, 1fr); }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/">Listing Generator</a>
    <a href="/follow-up.html" class="active">Lead Follow-Up</a>
    <a href="/objections.html">Objection Handler</a>
  </nav>

  <header>
    <h1>Lead <span>Follow-Up</span> Generator</h1>
    <p>Enter your lead's details. Get a 5-email sequence ready to send.</p>
  </header>

  <div class="card">
    <h2>Lead Info</h2>
    <div class="grid-2">
      <div class="field">
        <label>Lead First Name</label>
        <input type="text" id="lead-name" value="Sarah" />
      </div>
      <div class="field">
        <label>Lead Type</label>
        <select id="lead-type">
          <option value="Buyer">Buyer</option>
          <option value="Seller">Seller</option>
          <option value="Buyer & Seller">Buyer & Seller</option>
          <option value="Investor">Investor</option>
          <option value="Renter">Renter</option>
        </select>
      </div>
      <div class="field">
        <label>Lead Source</label>
        <select id="lead-source">
          <option value="Open House">Open House</option>
          <option value="Zillow">Zillow</option>
          <option value="Realtor.com">Realtor.com</option>
          <option value="Referral">Referral</option>
          <option value="Social Media">Social Media</option>
          <option value="Cold Outreach">Cold Outreach</option>
          <option value="Website">Website</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field">
        <label>Timeline</label>
        <select id="timeline">
          <option value="Ready now">Ready now</option>
          <option value="1-3 months" selected>1-3 months</option>
          <option value="3-6 months">3-6 months</option>
          <option value="6-12 months">6-12 months</option>
          <option value="Just browsing">Just browsing</option>
        </select>
      </div>
      <div class="field">
        <label>Price Range (optional)</label>
        <input type="text" id="price-range" value="$400k-$550k" />
      </div>
      <div class="field">
        <label>Area of Interest (optional)</label>
        <input type="text" id="area" value="South Austin" />
      </div>
      <div class="field full">
        <label>Notes — anything specific about this lead</label>
        <textarea id="notes" placeholder="e.g. Has kids, wants good school district. Pre-approved. Came to open house on Maple St.">Has two kids, wants a good school district. Pre-approved. Came to the open house on Maple St, loved the backyard.</textarea>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Tone</h2>
    <div class="tone-grid">
      <button class="tone-btn selected" data-tone="Warm & Personal">Warm</button>
      <button class="tone-btn" data-tone="Professional">Professional</button>
      <button class="tone-btn" data-tone="Direct & Confident">Direct</button>
    </div>
  </div>

  <button class="generate-btn" id="generate-btn">Generate 5-Email Sequence</button>
  <p id="gen-counter" style="text-align:center;font-size:0.8rem;margin-top:10px;max-width:640px;margin-left:auto;margin-right:auto;"></p>

  <div id="sequence-container"></div>

  <p style="text-align:center;font-size:0.7rem;color:#444;margin-top:40px;">v4.0 · <a href="#" id="admin-link" style="color:#333;text-decoration:none;">Admin</a></p>

  <!-- Admin Modal -->
  <div id="admin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:100%;max-width:360px;margin:20px;">
      <h2 style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:20px;">Admin Login</h2>
      <div class="field" style="margin-bottom:12px;">
        <label>Username</label>
        <input type="text" id="admin-username" value="Admin" />
      </div>
      <div class="field" style="margin-bottom:20px;">
        <label>Password</label>
        <input type="password" id="admin-password" />
      </div>
      <p id="admin-error" style="color:#e57373;font-size:0.85rem;margin-bottom:12px;display:none;"></p>
      <button class="generate-btn" id="admin-submit" style="margin-bottom:10px;">Login</button>
      <button id="admin-cancel" style="background:none;border:none;color:var(--muted);font-size:0.85rem;cursor:pointer;width:100%;font-family:inherit;">Cancel</button>
    </div>
  </div>

  <script>
    const FREE_LIMIT = 10;
    const ADMIN_TOKEN_KEY = 'admin_token';

    function isAdmin() { return !!localStorage.getItem(ADMIN_TOKEN_KEY); }
    function getCount() { return parseInt(localStorage.getItem('gen_count') || '0'); }
    function incrementCount() { localStorage.setItem('gen_count', getCount() + 1); }

    function updateCounter() {
      const el = document.getElementById('gen-counter');
      if (isAdmin()) {
        el.textContent = 'Admin — unlimited generations';
        el.style.color = 'var(--accent)';
        return;
      }
      const remaining = Math.max(0, FREE_LIMIT - getCount());
      if (remaining > 0) {
        el.textContent = `${remaining} free generation${remaining === 1 ? '' : 's'} remaining`;
        el.style.color = remaining === 1 ? '#e57373' : 'var(--muted)';
      } else {
        el.textContent = 'Free limit reached';
        el.style.color = '#e57373';
      }
    }

    function updateAdminLink() {
      const link = document.getElementById('admin-link');
      if (isAdmin()) {
        link.textContent = 'Admin: Logged In · Logout';
        link.style.color = 'var(--accent)';
      } else {
        link.textContent = 'Admin';
        link.style.color = '#333';
      }
    }

    let selectedTone = 'Warm & Personal';

    document.querySelectorAll('.tone-btn[data-tone]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tone-btn[data-tone]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedTone = btn.dataset.tone;
      });
    });

    updateCounter();
    updateAdminLink();

    document.getElementById('admin-link').addEventListener('click', (e) => {
      e.preventDefault();
      if (isAdmin()) {
        localStorage.removeItem(ADMIN_TOKEN_KEY);
        updateAdminLink();
        updateCounter();
      } else {
        const modal = document.getElementById('admin-modal');
        modal.style.display = 'flex';
        document.getElementById('admin-password').focus();
      }
    });

    document.getElementById('admin-cancel').addEventListener('click', () => {
      document.getElementById('admin-modal').style.display = 'none';
    });

    document.getElementById('admin-submit').addEventListener('click', async () => {
      const username = document.getElementById('admin-username').value.trim();
      const password = document.getElementById('admin-password').value.trim();
      const errorEl = document.getElementById('admin-error');
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Token': localStorage.getItem('admin_token') || '' },
          body: JSON.stringify({ username, password }),
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        localStorage.setItem(ADMIN_TOKEN_KEY, data.token);
        document.getElementById('admin-modal').style.display = 'none';
        updateAdminLink();
        updateCounter();
        document.getElementById('admin-password').value = '';
      } catch {
        errorEl.textContent = 'Invalid username or password.';
        errorEl.style.display = 'block';
      }
    });

    document.getElementById('admin-password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('admin-submit').click();
    });

    document.getElementById('generate-btn').addEventListener('click', async () => {
      if (!isAdmin() && getCount() >= FREE_LIMIT) {
        document.getElementById('sequence-container').innerHTML = `
          <div class="email-card visible">
            <div class="error-msg" style="text-align:center;padding:20px;line-height:1.8;">
              You've used your 10 free generations.<br><br>
              <strong style="color:var(--text);">Want full access?</strong><br>
              Email <a href="mailto:a.meach14@gmail.com" style="color:var(--accent);">a.meach14@gmail.com</a>
            </div>
          </div>`;
        return;
      }

      const payload = {
        name: document.getElementById('lead-name').value.trim(),
        leadType: document.getElementById('lead-type').value,
        source: document.getElementById('lead-source').value,
        timeline: document.getElementById('timeline').value,
        priceRange: document.getElementById('price-range').value.trim(),
        area: document.getElementById('area').value.trim(),
        notes: document.getElementById('notes').value.trim(),
        tone: selectedTone,
      };

      if (!payload.name) { alert('Please enter the lead\'s name.'); return; }

      const btn = document.getElementById('generate-btn');
      const container = document.getElementById('sequence-container');

      btn.disabled = true;
      btn.textContent = 'Generating...';
      container.innerHTML = `<div class="email-card visible"><div class="loading"><div class="spinner"></div> Writing your 5-email sequence...</div></div>`;

      try {
        const res = await fetch('/api/followup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Token': localStorage.getItem('admin_token') || '' },
          body: JSON.stringify(payload),
        });

        if (!res.ok) throw new Error('Server error');
        const data = await res.json();

        container.innerHTML = data.emails.map((email, i) => `
          <div class="email-card visible">
            <div class="email-header">
              <h3>Email ${i + 1} — ${email.purpose}</h3>
              <button class="copy-btn" onclick="copyEmail(${i})">Copy</button>
            </div>
            <div class="email-purpose">Send: ${email.timing}</div>
            <div class="email-body" id="email-${i}"><strong>Subject:</strong> ${email.subject}\n\n${email.body}</div>
          </div>
        `).join('');

        incrementCount();
        updateCounter();
      } catch (err) {
        container.innerHTML = `<div class="email-card visible"><div class="error-msg">Error: ${err.message}. Please try again.</div></div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate 5-Email Sequence';
      }
    });

    function copyEmail(index) {
      const text = document.getElementById(`email-${index}`).textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btns = document.querySelectorAll('.copy-btn');
        const btn = btns[index];
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }
  </script>
</body>
</html>
