<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Objection Handler — Real Estate</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2e2e2e;
      --accent: #c8a86b;
      --accent-dark: #a8883b;
      --text: #f0ece4;
      --muted: #888;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
    }

    nav a.active { color: var(--accent); }

    header {
      text-align: center;
      max-width: 640px;
      margin: 0 auto 40px;
      padding: 0 20px;
    }

    header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
    header h1 span { color: var(--accent); }
    header p { margin-top: 10px; color: var(--muted); font-size: 1rem; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 640px;
      margin: 0 auto 24px;
    }

    .card h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
      margin-bottom: 20px;
    }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    input, select, textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      padding: 10px 12px;
      width: 100%;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    select option { background: #222; }
    textarea { resize: vertical; min-height: 90px; }

    .tone-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

    .tone-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 9px 6px;
      text-align: center;
      transition: all 0.15s;
      font-family: inherit;
    }

    .tone-btn:hover { border-color: var(--accent); color: var(--text); }
    .tone-btn.selected {
      background: rgba(200, 168, 107, 0.12);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .quick-objections {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .quick-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 6px 14px;
      transition: all 0.15s;
      font-family: inherit;
    }

    .quick-btn:hover { border-color: var(--accent); color: var(--text); }

    .generate-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #0f0f0f;
      cursor: pointer;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      display: block;
      transition: background 0.15s, transform 0.1s;
    }

    .generate-btn:hover { background: var(--accent-dark); }
    .generate-btn:active { transform: scale(0.99); }
    .generate-btn:disabled { background: #444; color: #777; cursor: not-allowed; transform: none; }

    .output-card {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      max-width: 640px;
      margin: 24px auto 0;
    }

    .output-card.visible { display: block; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .output-header h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent);
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.8rem;
      padding: 6px 12px;
      transition: all 0.15s;
    }

    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: #4caf50; color: #4caf50; }

    #output-text {
      color: var(--text);
      font-size: 0.97rem;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      color: #e57373;
      font-size: 0.9rem;
      padding: 12px;
      background: rgba(229, 115, 115, 0.1);
      border: 1px solid rgba(229, 115, 115, 0.2);
      border-radius: 6px;
    }

    @media (max-width: 500px) {
      .grid-2 { grid-template-columns: 1fr; }
      .tone-grid { grid-template-columns: repeat(2, 1fr); }
      header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/">Listing Generator</a>
    <a href="/follow-up.html">Lead Follow-Up</a>
    <a href="/objections.html" class="active">Objection Handler</a>
    <a href="/admin.html" id="admin-nav-link" style="display:none;">Dashboard</a>
  </nav>

  <header>
    <h1><span>Objection</span> Handler</h1>
    <p>Type the objection. Get a confident, natural response to use on the spot.</p>
  </header>

  <div class="card">
    <h2>Common Objections</h2>
    <div class="quick-objections">
      <button class="quick-btn" data-objection="Your commission is too high. Other agents charge less.">Commission too high</button>
      <button class="quick-btn" data-objection="I want to wait until spring to list.">Want to wait until spring</button>
      <button class="quick-btn" data-objection="Zillow says my house is worth more than what you're suggesting.">Zillow says it's worth more</button>
      <button class="quick-btn" data-objection="I'm going to try selling it myself first (FSBO).">Going FSBO first</button>
      <button class="quick-btn" data-objection="I need to think about it before signing a listing agreement.">Need to think about it</button>
      <button class="quick-btn" data-objection="Interest rates are too high. Nobody is buying right now.">Interest rates too high</button>
      <button class="quick-btn" data-objection="We already have an agent we've worked with before.">Have another agent</button>
      <button class="quick-btn" data-objection="I don't think now is a good time to buy. The market is going to crash.">Market going to crash</button>
    </div>
  </div>

  <div class="card">
    <h2>Objection Details</h2>
    <div class="grid-2">
      <div class="field">
        <label>Your Role</label>
        <select id="role">
          <option value="Listing Agent">Listing Agent</option>
          <option value="Buyer's Agent">Buyer's Agent</option>
        </select>
      </div>
      <div class="field">
        <label>Delivery Method</label>
        <select id="delivery">
          <option value="In person / on the phone">In person / phone</option>
          <option value="Via text or email">Text or email</option>
        </select>
      </div>
      <div class="field full">
        <label>The Objection</label>
        <textarea id="objection" placeholder="Type the exact objection or pick one above..."></textarea>
      </div>
      <div class="field full">
        <label>Context (optional) — any relevant details about the situation</label>
        <textarea id="context" placeholder="e.g. Seller has been listed for 45 days, originally priced at $550k, comp came in at $520k..." style="min-height:70px;"></textarea>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Tone</h2>
    <div class="tone-grid">
      <button class="tone-btn selected" data-tone="Empathetic">Empathetic</button>
      <button class="tone-btn" data-tone="Confident">Confident</button>
      <button class="tone-btn" data-tone="Direct">Direct</button>
    </div>
  </div>

  <button class="generate-btn" id="generate-btn">Generate Response</button>
  <p id="gen-counter" style="text-align:center;font-size:0.8rem;margin-top:10px;max-width:640px;margin-left:auto;margin-right:auto;"></p>

  <div class="output-card" id="output-card">
    <div class="output-header">
      <h2>Your Response</h2>
      <button class="copy-btn" id="copy-btn">Copy</button>
    </div>
    <div id="output-text"></div>
    <button class="copy-btn" id="regen-btn" style="margin-top:16px;width:100%;padding:10px;display:none;">Try Another Response</button>
  </div>

  <p style="text-align:center;font-size:0.7rem;color:#444;margin-top:40px;">v1.0 · <a href="#" id="admin-link" style="color:#333;text-decoration:none;">Admin</a></p>

  <!-- Admin Modal -->
  <div id="admin-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:100%;max-width:360px;margin:20px;">
      <h2 style="font-size:0.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:20px;">Admin Login</h2>
      <div class="field" style="margin-bottom:12px;">
        <label>Username</label>
        <input type="text" id="admin-username" value="Admin" />
      </div>
      <div class="field" style="margin-bottom:20px;">
        <label>Password</label>
        <input type="password" id="admin-password" />
      </div>
      <p id="admin-error" style="color:#e57373;font-size:0.85rem;margin-bottom:12px;display:none;"></p>
      <button class="generate-btn" id="admin-submit" style="margin-bottom:10px;">Login</button>
      <button id="admin-cancel" style="background:none;border:none;color:var(--muted);font-size:0.85rem;cursor:pointer;width:100%;font-family:inherit;">Cancel</button>
    </div>
  </div>

  <script>
    const FREE_LIMIT = 10;
    const ADMIN_TOKEN_KEY = 'admin_token';

    function isAdmin() { return !!localStorage.getItem(ADMIN_TOKEN_KEY); }
    function getCount() { return parseInt(localStorage.getItem('gen_count') || '0'); }
    function incrementCount() { localStorage.setItem('gen_count', getCount() + 1); }
    function getSessionId() {
      let id = localStorage.getItem('session_id');
      if (!id) { id = 'sess_' + Math.random().toString(36).substr(2, 9); localStorage.setItem('session_id', id); }
      return id;
    }
    function logPaywall() {
      fetch('/api/log/paywall', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-Token': localStorage.getItem('admin_token') || '', 'X-Session-Id': getSessionId(), 'X-Session-Id': getSessionId() }, body: '{}' }).catch(() => {});
    }

    function updateCounter() {
      const el = document.getElementById('gen-counter');
      if (isAdmin()) {
        el.textContent = 'Admin — unlimited generations';
        el.style.color = 'var(--accent)';
        return;
      }
      const remaining = Math.max(0, FREE_LIMIT - getCount());
      if (remaining > 0) {
        el.textContent = `${remaining} free generation${remaining === 1 ? '' : 's'} remaining`;
        el.style.color = remaining === 1 ? '#e57373' : 'var(--muted)';
      } else {
        el.textContent = 'Free limit reached';
        el.style.color = '#e57373';
      }
    }

    function updateAdminLink() {
      const link = document.getElementById('admin-link');
      if (isAdmin()) {
        link.textContent = 'Admin: Logged In · Logout';
        link.style.color = 'var(--accent)';
      } else {
        link.textContent = 'Admin';
        link.style.color = '#333';
      }
    }

    let selectedTone = 'Empathetic';

    document.querySelectorAll('.tone-btn[data-tone]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tone-btn[data-tone]').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedTone = btn.dataset.tone;
      });
    });

    // Quick objection buttons
    document.querySelectorAll('.quick-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('objection').value = btn.dataset.objection;
      });
    });

    updateCounter();
    updateAdminLink();
    if (isAdmin()) document.getElementById('admin-nav-link').style.display = 'block';

    // Admin modal
    document.getElementById('admin-link').addEventListener('click', (e) => {
      e.preventDefault();
      if (isAdmin()) {
        localStorage.removeItem(ADMIN_TOKEN_KEY);
        updateAdminLink();
        updateCounter();
      } else {
        document.getElementById('admin-modal').style.display = 'flex';
        document.getElementById('admin-password').focus();
      }
    });

    document.getElementById('admin-cancel').addEventListener('click', () => {
      document.getElementById('admin-modal').style.display = 'none';
    });

    document.getElementById('admin-submit').addEventListener('click', async () => {
      const username = document.getElementById('admin-username').value.trim();
      const password = document.getElementById('admin-password').value.trim();
      const errorEl = document.getElementById('admin-error');
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Token': localStorage.getItem('admin_token') || '', 'X-Session-Id': getSessionId() },
          body: JSON.stringify({ username, password }),
        });
        if (!res.ok) throw new Error();
        const data = await res.json();
        localStorage.setItem(ADMIN_TOKEN_KEY, data.token);
        document.getElementById('admin-modal').style.display = 'none';
        updateAdminLink();
        updateCounter();
        document.getElementById('admin-password').value = '';
      } catch {
        errorEl.textContent = 'Invalid username or password.';
        errorEl.style.display = 'block';
      }
    });

    document.getElementById('admin-password').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('admin-submit').click();
    });

    async function generate() {
      if (!isAdmin() && getCount() >= FREE_LIMIT) {
        logPaywall();
        const outputCard = document.getElementById('output-card');
        const outputText = document.getElementById('output-text');
        outputCard.classList.add('visible');
        outputText.innerHTML = `<div class="error-msg" style="text-align:center;padding:20px;line-height:1.8;">
          You've used your 10 free generations.<br><br>
          <strong style="color:var(--text);">Want full access?</strong><br>
          Email <a href="mailto:a.meach14@gmail.com" style="color:var(--accent);">a.meach14@gmail.com</a>
        </div>`;
        return;
      }

      const objection = document.getElementById('objection').value.trim();
      if (!objection) { alert('Please enter an objection.'); return; }

      const payload = {
        objection,
        role: document.getElementById('role').value,
        delivery: document.getElementById('delivery').value,
        context: document.getElementById('context').value.trim(),
        tone: selectedTone,
      };

      const btn = document.getElementById('generate-btn');
      const outputCard = document.getElementById('output-card');
      const outputText = document.getElementById('output-text');

      btn.disabled = true;
      btn.textContent = 'Generating...';
      outputCard.classList.add('visible');
      outputText.innerHTML = '<div class="loading"><div class="spinner"></div> Writing your response...</div>';
      document.getElementById('regen-btn').style.display = 'none';

      try {
        const res = await fetch('/api/objection', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-Admin-Token': localStorage.getItem('admin_token') || '', 'X-Session-Id': getSessionId() },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error('Server error');
        const data = await res.json();
        outputText.textContent = data.response;
        incrementCount();
        updateCounter();
        document.getElementById('regen-btn').style.display = 'block';
      } catch (err) {
        outputText.innerHTML = `<div class="error-msg">Error: ${err.message}. Please try again.</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Generate Response';
      }
    }

    document.getElementById('generate-btn').addEventListener('click', generate);
    document.getElementById('regen-btn').addEventListener('click', generate);

    document.getElementById('copy-btn').addEventListener('click', () => {
      const text = document.getElementById('output-text').textContent;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copy-btn');
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    });
  </script>
</body>
</html>
